<?xml version="1.0" encoding="UTF-8"?>
<!-- 循環エンブレム:人がAIを育て、AIが人を育てる(concept0_cover.svgから抽出・Web向け調整) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="630 105 340 380" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif">

  <defs>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
    <symbol id="person" viewBox="0 0 40 48">
      <circle cx="20" cy="10" r="9" fill="currentColor"/>
      <path d="M4,46 C4,32 11,27 20,27 C29,27 36,32 36,46 Z" fill="currentColor"/>
    </symbol>
    <symbol id="ai-chip" viewBox="0 0 64 64">
      <rect x="10" y="10" width="44" height="44" rx="10" fill="currentColor"/>
      <g stroke="currentColor" stroke-width="4" stroke-linecap="round">
        <line x1="20" y1="10" x2="20" y2="2"/><line x1="32" y1="10" x2="32" y2="2"/><line x1="44" y1="10" x2="44" y2="2"/>
        <line x1="20" y1="54" x2="20" y2="62"/><line x1="32" y1="54" x2="32" y2="62"/><line x1="44" y1="54" x2="44" y2="62"/>
        <line x1="10" y1="20" x2="2" y2="20"/><line x1="10" y1="32" x2="2" y2="32"/><line x1="10" y1="44" x2="2" y2="44"/>
        <line x1="54" y1="20" x2="62" y2="20"/><line x1="54" y1="32" x2="62" y2="32"/><line x1="54" y1="44" x2="62" y2="44"/>
      </g>
      <text x="32" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">AI</text>
    </symbol>
  </defs>

  <style>
    .cyclbl { font-size:26px; font-weight:700; }
    .navy   { color:#1e3a5f; }
    .orange { color:#d97706; }
  </style>

  <g id="emblem">
    <path d="M705,225 Q800,150 900,225" fill="none" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow-teal)"/>
    <text class="cyclbl" x="800" y="140" text-anchor="middle" fill="#0f766e">人がAIを育てる</text>

    <use href="#person" class="navy" x="655" y="255" width="70" height="84"/>
    <use href="#ai-chip" class="orange" x="845" y="250" width="78" height="78"/>

    <path d="M895,355 Q800,430 700,355" fill="none" stroke="#d97706" stroke-width="4" marker-end="url(#arrow-orange)"/>
    <text class="cyclbl" x="800" y="462" text-anchor="middle" fill="#d97706">AIが人を育てる</text>
  </g>
</svg>
