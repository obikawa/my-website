<?xml version="1.0" encoding="UTF-8"?>
<!-- 型B:ジェネラリスト×AI ── 複数の小さな専門家を「頭脳」に、自分の手で作り上げる(Web向け調整版・文字拡大) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="70 135 1460 815" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif">

  <defs>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
    <symbol id="person" viewBox="0 0 40 48">
      <circle cx="20" cy="10" r="9" fill="currentColor"/>
      <path d="M4,46 C4,32 11,27 20,27 C29,27 36,32 36,46 Z" fill="currentColor"/>
    </symbol>
    <symbol id="ai-chip" viewBox="0 0 64 64">
      <rect x="10" y="10" width="44" height="44" rx="10" fill="currentColor"/>
      <g stroke="currentColor" stroke-width="4" stroke-linecap="round">
        <line x1="20" y1="10" x2="20" y2="2"/><line x1="32" y1="10" x2="32" y2="2"/><line x1="44" y1="10" x2="44" y2="2"/>
        <line x1="20" y1="54" x2="20" y2="62"/><line x1="32" y1="54" x2="32" y2="62"/><line x1="44" y1="54" x2="44" y2="62"/>
        <line x1="10" y1="20" x2="2" y2="20"/><line x1="10" y1="32" x2="2" y2="32"/><line x1="10" y1="44" x2="2" y2="44"/>
        <line x1="54" y1="20" x2="62" y2="20"/><line x1="54" y1="32" x2="62" y2="32"/><line x1="54" y1="44" x2="62" y2="44"/>
      </g>
      <text x="32" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">AI</text>
    </symbol>
  </defs>

  <style>
    .bg        { fill:#f8fafc; }
    .panel-sub { fill:#f1f5f9; stroke:#cbd5e1; stroke-width:1; }
    .h3        { fill:#0f172a; font-size:26px; font-weight:700; }
    .body      { fill:#334155; font-size:24px; font-weight:700; }
    .small     { fill:#64748b; font-size:20px; }
    .tag       { font-size:19px; font-weight:700; fill:#ffffff; }
    .teal      { color:#0f766e; }
    .flowteal  { stroke:#0f766e; stroke-width:2.5; fill:none; }
  </style>

  <rect class="bg" x="0" y="0" width="1600" height="1000"/>

  <!-- ============ 複数の小さな専門家(頭脳) ============ -->
  <g id="ai-row">
    <text class="small" x="800" y="170" text-anchor="middle">複数の小さな専門家に相談・発注し、回答や部品(パーツ)を受け取る</text>
    <use href="#ai-chip" class="teal" x="348" y="190" width="64" height="64"/>
    <use href="#ai-chip" class="teal" x="628" y="190" width="64" height="64"/>
    <use href="#ai-chip" class="teal" x="908" y="190" width="64" height="64"/>
    <use href="#ai-chip" class="teal" x="1188" y="190" width="64" height="64"/>
    <text class="body" x="380" y="292" text-anchor="middle" fill="#0f766e">小さな専門家</text>
    <text class="body" x="660" y="292" text-anchor="middle" fill="#0f766e">小さな専門家</text>
    <text class="body" x="940" y="292" text-anchor="middle" fill="#0f766e">小さな専門家</text>
    <text class="body" x="1220" y="292" text-anchor="middle" fill="#0f766e">小さな専門家</text>
  </g>

  <!-- 相談・発注 ⇄ 回答(双方向) -->
  <g id="consult-flow">
    <path class="flowteal" d="M380,308 L742,418" marker-start="url(#arrow-accent)" marker-end="url(#arrow-accent)"/>
    <path class="flowteal" d="M660,308 L780,402" marker-start="url(#arrow-accent)" marker-end="url(#arrow-accent)"/>
    <path class="flowteal" d="M940,308 L820,402" marker-start="url(#arrow-accent)" marker-end="url(#arrow-accent)"/>
    <path class="flowteal" d="M1220,308 L858,418" marker-start="url(#arrow-accent)" marker-end="url(#arrow-accent)"/>
    <text class="small" x="800" y="345" text-anchor="middle">相談 ⇄ 回答</text>
  </g>

  <!-- ============ ジェネラリスト ============ -->
  <g id="generalist">
    <use href="#person" class="teal" x="770" y="425" width="60" height="72"/>
    <text class="h3" x="800" y="532" text-anchor="middle">ジェネラリスト(一人)</text>
    <rect x="610" y="546" width="380" height="38" rx="19" fill="#0f766e"/>
    <text class="tag" x="800" y="572" text-anchor="middle">役割:判断も、手を動かすのも自分</text>
  </g>

  <!-- 統合・仕上げ → 成果物 -->
  <g id="output">
    <path class="flowteal" d="M800,596 L800,650" marker-end="url(#arrow-accent)"/>
    <text class="small" x="820" y="628">自分の手で統合・仕上げる</text>
    <rect class="panel-sub" x="690" y="660" width="220" height="80" rx="10"/>
    <text class="h3" x="800" y="695" text-anchor="middle">成果物</text>
    <text class="small" x="800" y="725" text-anchor="middle">一人で全工程を完結</text>
  </g>

  <!-- 左右の注記 -->
  <g id="side-notes">
    <text class="small" x="90" y="440">※ AIは「分業相手」ではなく</text>
    <text class="small" x="90" y="468">「拡張された頭脳」。人は動かさない。</text>
    <text class="small" x="1510" y="440" text-anchor="end">スペシャリスト型との違い:</text>
    <text class="small" x="1510" y="468" text-anchor="end">実行を任せず、自分が動く。</text>
  </g>

  <!-- ============ キーメッセージ ============ -->
  <g id="keymessage">
    <rect x="170" y="856" width="1260" height="72" rx="12" fill="#e6f4f2" stroke="#0f766e" stroke-width="1.5"/>
    <text x="800" y="900" text-anchor="middle" font-size="24" font-weight="700" fill="#0f766e">複数のAIを頭脳として使い、成果物は自分の手で作り上げる ── 一人で全工程をこなす</text>
  </g>
</svg>
