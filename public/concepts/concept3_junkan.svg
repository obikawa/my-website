<?xml version="1.0" encoding="UTF-8"?>
<!-- 成長の好循環 ── 人がAIを育て、AIが人を育てる(Web向け調整版・文字拡大) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="230 135 1240 680" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif">

  <defs>
    <marker id="arrow-human" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-ai" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
    <marker id="arrow-mini" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-mini-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
    <marker id="arrow-mini-navy" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1e3a5f"/>
    </marker>
    <symbol id="person" viewBox="0 0 40 48">
      <circle cx="20" cy="10" r="9" fill="currentColor"/>
      <path d="M4,46 C4,32 11,27 20,27 C29,27 36,32 36,46 Z" fill="currentColor"/>
    </symbol>
    <symbol id="ai-chip" viewBox="0 0 64 64">
      <rect x="10" y="10" width="44" height="44" rx="10" fill="currentColor"/>
      <g stroke="currentColor" stroke-width="4" stroke-linecap="round">
        <line x1="20" y1="10" x2="20" y2="2"/><line x1="32" y1="10" x2="32" y2="2"/><line x1="44" y1="10" x2="44" y2="2"/>
        <line x1="20" y1="54" x2="20" y2="62"/><line x1="32" y1="54" x2="32" y2="62"/><line x1="44" y1="54" x2="44" y2="62"/>
        <line x1="10" y1="20" x2="2" y2="20"/><line x1="10" y1="32" x2="2" y2="32"/><line x1="10" y1="44" x2="2" y2="44"/>
        <line x1="54" y1="20" x2="62" y2="20"/><line x1="54" y1="32" x2="62" y2="32"/><line x1="54" y1="44" x2="62" y2="44"/>
      </g>
      <text x="32" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">AI</text>
    </symbol>
  </defs>

  <style>
    .bg       { fill:#f8fafc; }
    .card     { fill:#ffffff; stroke-width:2; }
    .h3       { fill:#0f172a; font-size:22px; font-weight:700; }
    .small    { fill:#64748b; font-size:18px; }
    .tag      { font-size:16px; font-weight:700; fill:#ffffff; }
    .navy     { color:#1e3a5f; }
    .teal     { color:#0f766e; }
    .gray     { color:#64748b; }
    .orange   { color:#d97706; }
    .loop-h   { stroke:#334155; stroke-width:3; fill:none; }
    .loop-a   { stroke:#d97706; stroke-width:3; fill:none; }
    .mini     { stroke-width:2.5; fill:none; }
  </style>

  <rect class="bg" x="0" y="0" width="1600" height="1000"/>

  <!-- ============ 凡例 ============ -->
  <g id="legend">
    <line x1="1200" y1="158" x2="1255" y2="158" stroke="#334155" stroke-width="3"/>
    <text class="small" x="1265" y="164" fill="#334155">人の成長</text>
    <line x1="1200" y1="192" x2="1255" y2="192" stroke="#d97706" stroke-width="3"/>
    <text class="small" x="1265" y="198" fill="#d97706">AIの成長・昇格</text>
  </g>

  <!-- ============ 循環矢印 ============ -->
  <g id="loop-arrows">
    <!-- 人:新人 → ジェネラリスト -->
    <path class="loop-h" d="M1035,290 Q1190,410 1150,605" marker-end="url(#arrow-human)"/>
    <text class="small" x="1195" y="420" fill="#334155">一人前になり、</text>
    <text class="small" x="1195" y="446" fill="#334155">AIを共に育てる側へ</text>

    <!-- 人:ジェネラリスト → スペシャリスト -->
    <path class="loop-h" d="M945,672 L665,672" marker-end="url(#arrow-human)"/>
    <text class="small" x="805" y="652" text-anchor="middle" fill="#334155">専門を見つけ、采配する側へ</text>

    <!-- AI:育成中のAI → 分身AI・小さな専門家へ昇格 -->
    <path class="loop-a" d="M945,738 L665,738" marker-end="url(#arrow-ai)"/>
    <text class="small" x="805" y="766" text-anchor="middle" fill="#d97706">育てたAIが</text>
    <text class="small" x="805" y="792" text-anchor="middle" fill="#d97706">分身・小さな専門家へ昇格</text>

    <!-- AI:分身AI・小さな専門家 → 教師AIへ昇格 -->
    <path class="loop-a" d="M435,605 Q330,380 590,258" marker-end="url(#arrow-ai)"/>
    <text class="small" x="420" y="390" text-anchor="end" fill="#d97706">実戦で磨かれたAIが</text>
    <text class="small" x="420" y="416" text-anchor="end" fill="#d97706">教師AIに昇格</text>
  </g>

  <!-- ============ カード:新人×教師AI(上) ============ -->
  <g id="card-shinjin">
    <rect class="card" x="600" y="160" width="420" height="180" rx="12" stroke="#64748b"/>
    <rect x="616" y="174" width="165" height="30" rx="15" fill="#64748b"/>
    <text class="tag" x="698" y="195" text-anchor="middle">段階①|AIに学ぶ</text>
    <text class="h3" x="616" y="232">新人・若手 × 教師AI</text>
    <use href="#ai-chip" class="orange" x="716" y="244" width="40" height="40"/>
    <use href="#ai-chip" class="orange" x="742" y="256" width="40" height="40"/>
    <use href="#ai-chip" class="orange" x="768" y="268" width="40" height="40"/>
    <path class="mini" d="M820,268 L850,268" stroke="#64748b" marker-end="url(#arrow-mini)"/>
    <use href="#person" class="gray" x="860" y="242" width="44" height="53"/>
    <text class="small" x="616" y="328">複数の小さな専門家が、新人に業務を教える</text>
  </g>

  <!-- ============ カード:ジェネラリスト×育成中のAI(右下) ============ -->
  <g id="card-generalist">
    <rect class="card" x="950" y="610" width="420" height="180" rx="12" stroke="#0f766e"/>
    <rect x="966" y="624" width="175" height="30" rx="15" fill="#0f766e"/>
    <text class="tag" x="1053" y="645" text-anchor="middle">段階②|AIを育てる</text>
    <text class="h3" x="966" y="682">ジェネラリスト×共同育成</text>
    <use href="#person" class="teal" x="1012" y="704" width="34" height="41"/>
    <use href="#person" class="teal" x="1052" y="694" width="44" height="53"/>
    <use href="#person" class="teal" x="1102" y="704" width="34" height="41"/>
    <path class="mini" d="M1148,718 L1190,718" stroke="#0f766e" marker-start="url(#arrow-mini-teal)" marker-end="url(#arrow-mini-teal)"/>
    <use href="#ai-chip" class="teal" x="1200" y="694" width="48" height="48"/>
    <text class="small" x="966" y="778">共用する → 知識・指示・修正・評価で共同育成</text>
  </g>

  <!-- ============ カード:スペシャリスト×分身AI(左下) ============ -->
  <g id="card-specialist">
    <rect class="card" x="290" y="610" width="360" height="180" rx="12" stroke="#1e3a5f"/>
    <rect x="306" y="624" width="195" height="30" rx="15" fill="#1e3a5f"/>
    <text class="tag" x="403" y="645" text-anchor="middle">段階③|AIを采配する</text>
    <text class="h3" x="306" y="682">スペシャリスト × 分身AI</text>
    <use href="#person" class="navy" x="339" y="694" width="44" height="53"/>
    <path class="mini" d="M393,718 L437,718" stroke="#1e3a5f" marker-end="url(#arrow-mini-navy)"/>
    <use href="#ai-chip" class="navy" x="445" y="694" width="48" height="48"/>
    <path class="mini" d="M503,718 L533,718" stroke="#1e3a5f" marker-end="url(#arrow-mini-navy)"/>
    <use href="#ai-chip" class="navy" x="541" y="696" width="36" height="36"/>
    <use href="#ai-chip" class="navy" x="565" y="720" width="36" height="36"/>
    <text class="small" x="306" y="778">分身AIが小さな専門家と人を采配する</text>
  </g>

  <!-- ============ 中央メッセージ ============ -->
  <g id="center">
    <text x="800" y="468" text-anchor="middle" font-size="34" font-weight="700" fill="#0f172a">成長の好循環</text>
    <text x="800" y="508" text-anchor="middle" font-size="20" fill="#334155">人の成長(紺)とAIの成長(橙)が</text>
    <text x="800" y="536" text-anchor="middle" font-size="20" fill="#334155">ひとつの輪になって回り続ける</text>
  </g>
</svg>
